name: C/C++ CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  job:
    name: ${{ matrix.os }}-${{ matrix.cxx }}-build-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        name: [windows-msvc]
        # For Windows msvc, for Linux and macOS let's use the clang compiler, use gcc for Linux.
        include:
          - name: windows-msvc
            os: windows-latest
            cxx: cl.exe
            cc: cl.exe

    steps:
    - uses: actions/checkout@v2
    
    - uses: lukka/get-cmake@latest
    
    - uses: ilammy/msvc-dev-cmd@v1
    
    - uses: lukka/set-shell-env@v1
      with:
        CXX: ${{ matrix.cxx }}
        CC: ${{ matrix.cc }}
    
    - name: configure and build
      uses: lukka/run-cmake@v2
      env:
        DXSDK_DIR: '${{ github.workspace }}/deps/d3d'
        DIRECTX_HOME: ${GITHUB_WORKSPACE}/deps/d3d
        DIRECTX_ROOT: '${GITHUB_WORKSPACE}/deps/d3d'
        DIRECTX_BASE: "${{ github.workspace }}/deps/d3d"
      with:
        cmakeListsOrSettingsJson: CMakeListsTxtAdvanced
        cmakeListsTxtPath: '${{ github.workspace }}/CMakeLists.txt'
        cmakeAppendedArgs: '-GNinja -DCMAKE_BUILD_TYPE=Release -DASSIMP_BUILD_ASSIMP_TOOLS=1 -DASSIMP_BUILD_ASSIMP_VIEW=1 -DDirectX_INCLUDE_DIR="${{ github.workspace }}/deps/d3d/Include" -DDirectX_D3DX9_LIBRARY="${{ github.workspace }}/deps/d3d/Lib/x64/d3dx9.lib"'
        buildWithCMakeArgs: '-- -v'
        buildDirectory: '${{ github.workspace }}/build/'
        
    - name: test
      run: cd build/bin && ./unit
      shell: bash

    - name: list-all
      run: ls -lR build
      shell: bash

    - uses: actions/upload-artifact@v2
      with:
        name: assimp-exes
        path: build/bin
